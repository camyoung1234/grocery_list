<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, shrink-to-fit=no, maximum-scale=1.0, user-scalable=no">
    <title>Grocery List</title>
    <link rel="stylesheet" href="style.css?v=14">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- PWA & Mobile Install Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f5f6fa">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Groceries">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

</head>

<body>

    <div class="app-container">
        <div class="tabs-container">
            <div class="tabs-scroll" id="tabs-list">
                <!-- Tabs injected by JS -->
            </div>
        </div>

        <input type="file" id="import-input" accept=".json" class="hidden-input">

        <ul id="grocery-list" class="grocery-list">
            <!-- Items will be added here dynamically -->
        </ul>

        <nav class="mode-bar">
            <button class="mode-tab" id="mode-home" data-mode="home">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>
            <button class="mode-tab" id="mode-shop" data-mode="shop">
                <i class="fas fa-shopping-cart"></i>
                <span>Store</span>
            </button>
        </nav>
    </div>

    <!-- Custom Modal -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <h3 id="modal-title">Enter Text</h3>

            <div class="form-group" id="modal-input-group">
                <label for="modal-input" class="modal-label">Name</label>
                <input type="text" id="modal-input" placeholder="Type here...">
            </div>

            <div class="form-group" id="modal-theme-group">
                <label class="modal-label">Theme</label>
                <div class="custom-theme-dropdown" id="theme-dropdown">
                    <div class="theme-trigger" id="theme-trigger">
                        <div class="theme-swatch" id="current-theme-swatch"></div>
                        <span id="current-theme-name">Blue</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="theme-options" id="theme-options">
                        <!-- Options injected by JS -->
                    </div>
                </div>
            </div>

            <div class="form-group hidden" id="modal-home-section-group">
                <label for="modal-home-section" class="modal-label">Home Section</label>
                <select id="modal-home-section" class="modal-select"></select>
            </div>

            <div class="form-group hidden" id="modal-shop-section-group">
                <label for="modal-shop-section" class="modal-label">Shop Section</label>
                <select id="modal-shop-section" class="modal-select"></select>
            </div>

            <div class="modal-actions">
                <button id="modal-delete-btn" class="modal-btn delete"
                    style="margin-right: auto; display: none;">Delete</button>
                <button id="modal-cancel-btn" class="modal-btn cancel">Cancel</button>
                <button id="modal-save-btn" class="modal-btn save">Save</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal-overlay" class="modal-overlay">
        <div class="modal">
            <h3 class="text-danger" id="delete-modal-title">Delete?</h3>
            <p>This action cannot be undone. Are you sure you want to delete <strong id="delete-match-name"></strong>?
            </p>
            <div class="modal-actions">
                <button id="delete-cancel-btn" class="modal-btn cancel">Cancel</button>
                <button id="delete-confirm-btn" class="modal-btn delete">Confirm Delete</button>
            </div>
        </div>
    </div>

    <!-- Section Delete Confirmation Modal -->
    <div id="section-delete-modal-overlay" class="modal-overlay">
        <div class="modal">
            <h3 class="text-danger" id="section-delete-modal-title">Delete Section?</h3>
            <p id="section-delete-modal-text"></p>
            <div class="modal-actions" style="flex-direction: column; gap: 0.5rem;">
                <button id="section-delete-only-btn" class="modal-btn delete" style="width: 100%;">Delete Section
                    Only</button>
                <button id="section-delete-all-btn" class="modal-btn delete" style="width: 100%;">Delete Section &
                    Items</button>
                <button id="section-delete-cancel-btn" class="modal-btn cancel" style="width: 100%;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Restore State Confirmation Modal -->
    <div id="restore-modal-overlay" class="modal-overlay">
        <div class="modal">
            <h3 id="restore-modal-title">Update App State?</h3>
            <p>A shared list has been detected. Would you like to update your local list with the shared one? Your current changes will be overwritten.</p>
            <div class="modal-actions">
                <button id="restore-cancel-btn" class="modal-btn cancel">No</button>
                <button id="restore-confirm-btn" class="modal-btn save">Yes, Update</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
